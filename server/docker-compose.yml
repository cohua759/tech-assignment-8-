services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ta7user
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/mysql
      - ./webserver/init.sql:/docker-entrypoint-initdb.d/init.sql

  webserver:
    build: ./webserver
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_PASSWORD: ${DB_PASSWORD}
      MQTT_BROKER: ${MQTT_BROKER}
      MQTT_TOPIC: ${MQTT_TOPIC}
      PYTHONUNBUFFERED: 1
    depends_on:
      - db

volumes:
  pg_data:
